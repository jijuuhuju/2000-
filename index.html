<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>browser-crusher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-screen">
        <!-- 最初の中心となる顔 -->
        <div id="crusher-face">☻</div>

        <h1>BROWSER CRUSHER</h1>
        <p>⚠️ 注意：光の点滅と音が出ます</p>
        
        <!-- WAV形式の音源を読み込み -->
        <audio id="funk-track" src="music.wav" loop type="audio/wav"></audio>
        <button id="start-btn">PLAY FUNK</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
