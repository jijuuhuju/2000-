<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>browser-crusher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 起動前の画面 -->
    <div id="welcome-screen">
        <h1>BROWSER CRUSHER</h1>
        <p>⚠️ 注意：光の点滅と音が出ます</p>
        <audio id="funk-track" src="music.wav" loop type="audio/wav"></audio>
        <button id="start-btn">PLAY FUNK</button>
    </div>

    <!-- ★これが量産される「ウィンドウ」のテンプレート -->
    <div id="window-template" class="fake-window" style="display: none;">
        <div class="title-bar">
            <span class="close-btn">✖</span>
        </div>
        <div class="window-content">
            <span class="face">☻</span>
            <span class="face">☻</span>
            <span class="face">☻</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
